name: Build site

on:
  push:
    branches: [main]
    paths:
      - 'products.json'
      - 'build_site.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Regenerate index.html from products.json
        run: python build_site.py
      - name: Commit regenerated index.html if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html"
          else
            git commit -m "Auto-rebuild index.html [skip ci]"
            git push
          fi
